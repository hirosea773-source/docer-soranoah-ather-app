name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.0

      - name: Start Supabase
        run: |
          supabase start
          echo "NEXT_PUBLIC_SUPABASE_URL=$(supabase status -o json | jq -r '.api_url')" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(supabase status -o json | jq -r '.anon_key')" >> $GITHUB_ENV
          echo "DATABASE_URL=$(supabase status -o json | jq -r '.db_url')" >> $GITHUB_ENV

      - name: Verify Environment Variables
        run: |
          if [ -n "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "NEXT_PUBLIC_SUPABASE_URL is set"
          else
            echo "NEXT_PUBLIC_SUPABASE_URL is EMPTY" && exit 1
          fi
          if [ -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY is set"
          else
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY is EMPTY" && exit 1
          fi
          if [ -n "$DATABASE_URL" ]; then
            echo "DATABASE_URL is set"
          else
            echo "DATABASE_URL is EMPTY" && exit 1
          fi

      - name: Verify proxy migration
        run: |
          test -f proxy.ts
          test ! -f middleware.ts
          grep -q "export async function proxy" proxy.ts

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e
