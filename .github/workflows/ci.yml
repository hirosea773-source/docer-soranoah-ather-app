name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.0

      - name: Start Supabase
        run: |
          supabase start

          SUPABASE_STATUS="$(supabase status --output json)"

          NEXT_PUBLIC_SUPABASE_URL="http://127.0.0.1:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY="$(echo "$SUPABASE_STATUS" | jq -r '.ANON_KEY')"
          DATABASE_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"

          test "$NEXT_PUBLIC_SUPABASE_URL" != "null"
          test "$NEXT_PUBLIC_SUPABASE_ANON_KEY" != "null"
          test "$DATABASE_URL" != "null"

          test -n "$NEXT_PUBLIC_SUPABASE_URL"
          test -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY"
          test -n "$DATABASE_URL"

          echo "NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY" >> "$GITHUB_ENV"
          echo "DATABASE_URL=$DATABASE_URL" >> "$GITHUB_ENV"

          echo "Supabase URL host: 127.0.0.1"

      - name: Check environment variables
        run: npm run check:env

      - name: Verify proxy migration
        run: |
          test -f proxy.ts
          test ! -f middleware.ts
          grep -q "export async function proxy" proxy.ts

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
